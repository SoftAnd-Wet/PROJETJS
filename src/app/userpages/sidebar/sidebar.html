<aside class="sidebar" [class.reduit]="reduit">

  <!-- ══ EN-TÊTE LOGO ══ -->
  <div class="sidebar-entete">
    <div class="logo">
      <div class="logo-icone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-texte">StudyFlow</span>
    </div>
    <button class="btn-toggle" (click)="basculer()" [title]="reduit ? 'Développer' : 'Réduire'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <line x1="3"  y1="6"  x2="21" y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="3"  y1="12" x2="21" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="3"  y1="18" x2="21" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ══ NAVIGATION ══ -->
  <nav class="sidebar-nav">

    <!-- Tableau de bord -->
    <div class="groupe-nav">
      <span class="libelle-groupe">Tableau de bord</span>
      <a class="item-nav" [class.actif]="itemActif === 'tableau-de-bord'"
         (click)="naviguer('tableau-de-bord')" [title]="reduit ? 'Tableau de bord' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3"  y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="3"  width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="3"  y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
            <rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="texte-nav">Tableau de bord</span>
      </a>
    </div>

    <!-- Planification -->
    <div class="groupe-nav">
      <span class="libelle-groupe">Planification</span>
      <a class="item-nav" [class.actif]="itemActif === 'planificateur'"
         (click)="naviguer('planificateur')" [title]="reduit ? 'Planificateur' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <rect x="3" y="4" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2"/>
            <line x1="16" y1="2" x2="16" y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="8"  y1="2" x2="8"  y2="6"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="3"  y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="texte-nav">Planificateur</span>
      </a>
      <a class="item-nav" [class.actif]="itemActif === 'sessions'"
         (click)="naviguer('sessions')" [title]="reduit ? 'Sessions' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            <polyline points="12 7 12 12 15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="texte-nav">Sessions</span>
        <span class="badge-nav">{{ sessionsAujourdhui }}</span>
      </a>
    </div>

    <!-- Collaboration -->
    <div class="groupe-nav">
      <span class="libelle-groupe">Collaboration</span>
      <a class="item-nav" [class.actif]="itemActif === 'groupes'"
         (click)="naviguer('groupes')" [title]="reduit ? 'Groupes' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/>
            <circle cx="9" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="texte-nav">Groupes</span>
        <span class="badge-nav nouveau">Nouveau</span>
      </a>
    </div>

    <!-- Analytique -->
    <div class="groupe-nav">
      <span class="libelle-groupe">Analytique</span>
      <a class="item-nav" [class.actif]="itemActif === 'statistiques'"
         (click)="naviguer('statistiques')" [title]="reduit ? 'Statistiques' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <line x1="18" y1="20" x2="18" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="12" y1="20" x2="12" y2="4"  stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <line x1="6"  y1="20" x2="6"  y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span class="texte-nav">Statistiques</span>
      </a>
    </div>

    <!-- Utilisateur -->
    <div class="groupe-nav">
      <span class="libelle-groupe">Utilisateur</span>
      <a class="item-nav" [class.actif]="itemActif === 'profil'"
         (click)="naviguer('profil')" [title]="reduit ? 'Profil' : ''">
        <span class="icone-nav">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="currentColor" stroke-width="2"/>
            <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
          </svg>
        </span>
        <span class="texte-nav">Profil</span>
      </a>
    </div>

  </nav>


  <!-- ══ PIED UTILISATEUR ══ -->
  <div class="pied-utilisateur">
    <img src="https://i.pravatar.cc/40?img=5" alt="avatar" class="avatar-utilisateur"/>
    <div class="info-utilisateur">
      <p class="nom-utilisateur">Alex Martin</p>
      <p class="role-utilisateur">Étudiant</p>
    </div>
    <button class="btn-deconnexion" title="Déconnexion" (click)="seDeconnecter()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="16 17 21 12 16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="21" y1="12" x2="9" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</aside>
