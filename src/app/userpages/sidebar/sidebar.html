<nav class="sidebar" [class.reduite]="reduit">

  <!-- En-tête -->
  <div class="entete-sidebar">
    <div class="logo-zone" *ngIf="!reduit">
      <div class="logo-icone">P</div>
      <div class="logo-texte">
        <h2>Planify</h2>
        <span>Study Platform</span>
      </div>
    </div>

    <button class="btn-toggle" (click)="basculer()" type="button">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
        <path d="M4 7H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M4 12H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M4 17H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <div class="contenu-sidebar">
    <ng-container *ngFor="let groupe of groupes; trackBy: tracerParLibelle">

      <div class="groupe-nav">
        <p class="titre-groupe" *ngIf="!reduit">{{ groupe.libelle }}</p>

        <button
          *ngFor="let item of groupe.items; trackBy: tracerParId"
          type="button"
          class="item-nav"
          [class.actif]="item.id === itemActif"
          (click)="naviguer(item.id)"
          [title]="reduit ? item.libelle : ''">

          <span class="icone-item">
            <ng-container [ngSwitch]="item.id">

              <!-- Dashboard -->
              <svg *ngSwitchCase="'tableau-de-bord'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="3" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/>
                <rect x="14" y="3" width="7" height="4" rx="2" stroke="currentColor" stroke-width="2"/>
                <rect x="14" y="10" width="7" height="11" rx="2" stroke="currentColor" stroke-width="2"/>
                <rect x="3" y="14" width="7" height="7" rx="2" stroke="currentColor" stroke-width="2"/>
              </svg>

              <!-- Planner -->
              <svg *ngSwitchCase="'planificateur'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <rect x="3" y="4" width="18" height="18" rx="3" stroke="currentColor" stroke-width="2"/>
                <path d="M8 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M16 2V6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M3 10H21" stroke="currentColor" stroke-width="2"/>
              </svg>

              <!-- Sessions -->
              <svg *ngSwitchCase="'sessions'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
                <path d="M12 7V12L15 15" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>

              <!-- Groupes -->
              <svg *ngSwitchCase="'groupes'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M16 21V19C16 17.8954 15.1046 17 14 17H6C4.89543 17 4 17.8954 4 19V21"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="10" cy="9" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M20 21V19C20 18.1586 19.4758 17.4061 18.6875 17.1115"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <path d="M15 5.13086C15.8604 5.43331 16.5 6.25404 16.5 7.22461C16.5 8.19517 15.8604 9.0159 15 9.31836"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>

              <!-- Statistiques -->
              <svg *ngSwitchCase="'statistiques'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M4 19H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <rect x="6" y="10" width="3" height="6" rx="1" stroke="currentColor" stroke-width="2"/>
                <rect x="11" y="6" width="3" height="10" rx="1" stroke="currentColor" stroke-width="2"/>
                <rect x="16" y="13" width="3" height="3" rx="1" stroke="currentColor" stroke-width="2"/>
              </svg>

              <!-- Profil -->
              <svg *ngSwitchCase="'profil'" width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M20 21V19C20 16.7909 18.2091 15 16 15H8C5.79086 15 4 16.7909 4 19V21"
                      stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <circle cx="12" cy="7" r="4" stroke="currentColor" stroke-width="2"/>
              </svg>

              <!-- Icône par défaut -->
              <svg *ngSwitchDefault width="18" height="18" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
              </svg>

            </ng-container>
          </span>

          <span class="libelle-item" *ngIf="!reduit">{{ item.libelle }}</span>

          <span
            *ngIf="!reduit && item.id === 'sessions' && sessionsAujourdhui > 0"
            class="badge-nav">
            {{ sessionsAujourdhui }}
          </span>

          <span
            *ngIf="!reduit && item.id !== 'sessions' && item.badge"
            class="badge-nav"
            [ngClass]="item.badgeClasse || ''">
            {{ item.badge }}
          </span>
        </button>
      </div>

    </ng-container>
  </div>

  <!-- Pied utilisateur -->
  <div class="pied-utilisateur">
    <div class="avatar-utilisateur avatar-user-box">
      <div class="avatar-user-svg">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="7" r="4"
                  stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
    </div>

    <div class="info-utilisateur" *ngIf="!reduit">
      <p class="nom-utilisateur">{{ utilisateur.nom }}</p>
      <p class="role-utilisateur">{{ utilisateur.role }}</p>
    </div>

    <button
      class="btn-deconnexion"
      type="button"
      title="Déconnexion"
      (click)="seDeconnecter()">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <polyline points="16 17 21 12 16 7"
                  stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="21" y1="12" x2="9" y2="12"
              stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

</nav>
